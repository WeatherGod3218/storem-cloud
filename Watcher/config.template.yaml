directories: # List of all directories to track
  - path: '/path/to/directory' # Path to the directory to track
    includeSubDirectories: true  # Whether or not to scan directories recursively
    subDirectoryLevels: 2 # How many levels deep to go when scanning recursively

  - path: 'other/path/to/file' # Can track multiple paths at once
    includeSubDirectories: true  # Also include subdirectories of this folder
    subDirectoryLevels: 0 # 0 scans INFINETLY, if you do not want any subdirectories.... set includeSubDirectories to false

hashFullFile: false # Whether to hash the full file contents, or just the filename
includeDirectoryPath: false # Whether to save the full filepath when backing up, or just the subdirectory + file (no effect if hashFullFile is true)
backupDuringRuntime: false # Whether to backup videos during runtime