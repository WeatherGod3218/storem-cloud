basePath: /api/v2
definitions:
  models.ChangeVideoDescriptionRequest:
    properties:
      description:
        type: string
      row_id:
        type: string
    type: object
  models.ChangeVideoTitleRequest:
    properties:
      row_id:
        type: string
      title:
        type: string
    type: object
  models.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  models.GetRandomVideoResponse:
    properties:
      row_id:
        type: string
    type: object
  models.GetVideoDataResponse:
    properties:
      custom_description:
        type: string
      custom_title:
        type: string
      filename:
        type: string
      row_id:
        type: string
      s3_id:
        type: string
      timestamp:
        type: string
      username:
        type: string
      video_url:
        type: string
    type: object
  models.GetVideoGroupCursor:
    properties:
      row_id:
        type: string
      timestamp:
        type: string
    type: object
  models.GetVideoGroupPartResponse:
    properties:
      custom_description:
        type: string
      custom_title:
        type: string
      filename:
        type: string
      row_id:
        type: string
      s3_id:
        type: string
      thumbnail:
        type: string
      timestamp:
        type: string
      username:
        type: string
    type: object
  models.GetVideoGroupRequest:
    properties:
      row_id:
        type: string
      timestamp:
        type: string
    type: object
  models.GetVideoGroupResponse:
    properties:
      cursor:
        $ref: '#/definitions/models.GetVideoGroupCursor'
      videos:
        items:
          $ref: '#/definitions/models.GetVideoGroupPartResponse'
        type: array
    type: object
  models.SuccessResponse:
    properties:
      success:
        type: boolean
    type: object
  models.Tag:
    properties:
      color:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
info:
  contact: {}
  description: API for backing up videos.
  title: WeatherReels
  version: "1.0"
paths:
  /api/v2/tags/create:
    post:
      consumes:
      - application/json
      description: Gets all of the tags associated with a video
      parameters:
      - description: Video id
        in: path
        name: request
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Tag'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Get Video's Tags
      tags:
      - videos
      - tags
  /api/v2/videos/abort:
    post:
      consumes:
      - application/json
      description: Gets a group of video and thumbnail urls with the given offset.
        Max of 10
      parameters:
      - description: Video information
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.GetVideoGroupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.GetVideoGroupResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Gets a group of video/thumbnail urls
  /api/v2/videos/description:
    put:
      consumes:
      - application/json
      description: Updates a given videoID's description
      parameters:
      - description: New Title
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.ChangeVideoDescriptionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Updates a videos description
  /api/v2/videos/fetch/{video}:
    get:
      consumes:
      - application/json
      description: Generate a presigned URL for a video file
      parameters:
      - description: Video information
        in: path
        name: request
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Get URL for a video
      tags:
      - videos
  /api/v2/videos/random:
    get:
      consumes:
      - application/json
      description: Gets all the required data for a random video display page
      parameters:
      - description: Video information
        in: path
        name: request
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.GetRandomVideoResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Get random data for a video
  /api/v2/videos/title:
    put:
      consumes:
      - application/json
      description: Updates a given videoID's title
      parameters:
      - description: New Title
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.ChangeVideoTitleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Updates a videos title
  /api/v2/videos/verify:
    put:
      consumes:
      - application/json
      description: Verifies videos that are already uploaded, returning a list of
        ones that are not verified
      parameters:
      - description: List of video filenames
        in: body
        name: request
        required: true
        schema:
          items:
            type: string
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              items:
                type: string
              type: array
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Verify uploaded Videos
      tags:
      - videos
  /api/v2/videos/video:
    get:
      consumes:
      - application/json
      description: Gets all the required data for a video display page
      parameters:
      - description: Video information
        in: path
        name: request
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.GetVideoDataResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Get data for a video
swagger: "2.0"
